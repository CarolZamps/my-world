<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0E13">
<title>Meu Mundo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0E13;
    --surface: #18161F;
    --surface-2: #221F2C;
    --border: #2A2735;
    --text: #F5F3F7;
    --text-dim: #8B8595;
    --text-faint: #5A5566;
    --accent: #6C8EFF;
    --accent-deep: #3B5BDB;

    --treino: #E8A020;
    --treino-soft: rgba(232, 160, 32, 0.12);
    --financas: #6EE7B7;
    --financas-soft: rgba(110, 231, 183, 0.12);
    --lembretes: #FBBF24;
    --lembretes-soft: rgba(251, 191, 36, 0.12);
    --cofrinho: #F472B6;
    --cofrinho-soft: rgba(244, 114, 182, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 0 20px 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* glow decorativo de fundo */
  .glow {
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 380px;
    background: radial-gradient(circle, rgba(59, 91, 219, 0.28), transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    padding: 40px 0 28px;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 46px;
    font-weight: 400;
    letter-spacing: -0.015em;
    line-height: 1.02;
  }

  .header h1 .accent {
    color: var(--accent);
    font-style: italic;
  }

  .header .sub {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 18px 22px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 152px;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }

  .card:active { transform: scale(0.97); }

  .card.live { cursor: pointer; }
  .card.live:hover { border-color: var(--c); background: var(--surface-2); }

  .card.soon { opacity: 0.62; }

  .card .icon-wrap {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    background: var(--c-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--c);
    margin-bottom: 16px;
  }
  .card .icon-wrap svg { width: 24px; height: 24px; }

  .card .title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .card .desc {
    margin-top: 4px;
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.35;
  }

  .card .badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 20px;
  }

  .card .arrow {
    position: absolute;
    bottom: 18px;
    right: 18px;
    color: var(--c);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .card.live:hover .arrow { opacity: 1; transform: translateX(0); }

  .footer {
    margin-top: 32px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="glow"></div>

<header class="header">
  <div class="eyebrow">Meu Mundo</div>
  <h1>Oi, <span class="accent">Carol</span><br>por onde<br>começamos?</h1>
  <p class="sub">Tudo da sua vida, num lugar só.</p>
</header>

<main class="grid">

  <a class="card live" href="/treino.html" style="--c:var(--treino);--c-soft:var(--treino-soft);">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 7v10M18 7v10M3 12h18"/></svg>
    </div>
    <div class="title">Treino</div>
    <div class="desc">Seu plano da semana e progresso</div>
    <span class="arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
  </a>

  <div class="card soon" style="--c:var(--financas);--c-soft:var(--financas-soft);">
    <span class="badge">Em breve</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v12H3zM3 10h18M7 15h4"/></svg>
    </div>
    <div class="title">Finanças</div>
    <div class="desc">Gastos, contas e pra onde vai o dinheiro</div>
  </div>

  <div class="card soon" style="--c:var(--lembretes);--c-soft:var(--lembretes-soft);">
    <span class="badge">Em breve</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
    </div>
    <div class="title">Lembretes</div>
    <div class="desc">O que não pode escapar</div>
  </div>

  <div class="card soon" style="--c:var(--cofrinho);--c-soft:var(--cofrinho-soft);">
    <span class="badge">Em breve</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 10c0-3-3-5-7-5s-7 2-7 5c0 1.5.8 2.8 2 3.7V17h2v-1.5c.9.3 1.9.5 3 .5s2.1-.2 3-.5V17h2v-3.3c1.2-.9 2-2.2 2-3.7M9 9h.01M3 11H2"/></svg>
    </div>
    <div class="title">Cofrinho</div>
    <div class="desc">Metas e dinheiro guardado</div>
  </div>

</main>

<p class="footer">feito com :sparkles: pela Carol</p>

</body>
</html>
