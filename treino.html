<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0E13">
<title>Meu Treino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0E13;
    --surface: #18161F;
    --surface-2: #221F2C;
    --border: #2A2735;
    --text: #F5F3F7;
    --text-dim: #8B8595;
    --text-faint: #5A5566;
    --accent: #E8A020;
    --accent-soft: rgba(232, 160, 32, 0.12);
    --accent-deep: #B8780A;
    --success: #6EE7B7;
    --lipedema: #E879F9;
    --lipedema-soft: rgba(232, 121, 249, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: 80px;
  }

  .header {
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .header h1 .focus {
    color: var(--accent);
    font-style: italic;
  }

  .day-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-faint);
    vertical-align: middle;
  }

  .progress-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-deep), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 38px;
    text-align: right;
  }

  .day-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex: 1;
    min-width: 44px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px 6px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .day-tab .day-letter { font-size: 13px; }

  .day-tab .day-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: transparent;
  }

  .day-tab.active {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .day-tab.has-progress .day-dot {
    background: var(--success);
  }

  .day-tab.is-rest { color: var(--text-faint); }

  .exercises { padding: 8px 16px 24px; }

  .exercise {
    border-bottom: 1px solid var(--border);
    transition: opacity 0.2s ease;
  }

  .exercise.done { opacity: 0.55; }

  .exercise-head {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 4px;
    cursor: pointer;
    user-select: none;
  }

  .check {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    margin-top: 2px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .check:active { border-color: var(--accent); }

  .check.done {
    background: var(--success);
    border-color: var(--success);
  }

  .check svg {
    width: 12px;
    height: 12px;
    color: var(--bg);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .check.done svg { opacity: 1; }

  .exercise-body { flex: 1; min-width: 0; }

  .exercise-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .lipedema-badge {
    background: var(--lipedema-soft);
    color: var(--lipedema);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .exercise-meta {
    margin-top: 4px;
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .chevron {
    color: var(--text-faint);
    transition: transform 0.2s ease;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .exercise.open .chevron { transform: rotate(180deg); }

  .exercise-detail {
    display: none;
    padding: 0 4px 18px 38px;
    flex-direction: column;
    gap: 14px;
  }

  .exercise.open .exercise-detail { display: flex; }

  .tip {
    background: var(--surface);
    border-left: 2px solid var(--lipedema);
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 600;
  }

  .field input,
  .field textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .field textarea {
    font-family: 'Inter', sans-serif;
    resize: none;
    min-height: 56px;
  }

  .field input:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .field .hint {
    font-size: 11px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
  }

  .field .hint strong { color: var(--text-dim); font-weight: 500; }

  .rest-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }
  .rest-state h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 400;
    margin-bottom: 8px;
    color: var(--text);
    font-style: italic;
  }

  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px;
    gap: 4px;
    z-index: 20;
  }

  .nav-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px 8px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .nav-btn.active {
    color: var(--accent);
    background: var(--accent-soft);
  }

  .nav-btn svg { width: 18px; height: 18px; }

  .view { display: none; }
  .view.active { display: block; }

  .history-content { padding: 8px 20px 24px; }
  .history-entry {
    background: var(--surface);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .history-entry-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .history-entry-name { font-size: 14px; font-weight: 600; }
  .history-entry-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }
  .history-entry-carga {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 13px;
  }
  .history-entry-obs {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
  }

  .empty-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
  }

  .cal-wrap {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-nav-btn {
    width: 32px; height: 32px;
    border: none;
    background: var(--surface-2);
    color: var(--text-dim);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .cal-nav-btn svg { width: 16px; height: 16px; }
  .cal-nav-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 14px;
  }
  .cal-dow {
    font-size: 10px;
    text-align: center;
    color: var(--text-faint);
    padding-bottom: 4px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-dim);
    border-radius: 8px;
    position: relative;
  }
  .cal-day.empty { visibility: hidden; }
  .cal-day.future { color: var(--text-faint); }
  .cal-day.done {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 700;
  }
  .cal-day.today { box-shadow: inset 0 0 0 1.5px var(--text-dim); }
  .cal-summary {
    display: flex;
    gap: 10px;
  }
  .cal-stat {
    flex: 1;
    background: var(--surface-2);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .cal-stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .cal-stat-label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-top: 2px;
  }

  .ex-links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ex-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    width: fit-content;
  }

  .alt-toggle {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    text-align: left;
  }

  .alt-list {
    margin-top: 8px;
    display: none;
    flex-wrap: wrap;
    gap: 6px;
  }

  .alt-list.open {
    display: flex;
  }

  .alt-list span {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-dim);
  }
</style>
</head>

let TREINOS = TREINOS_FALLBACK;
const DIAS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const EX_CACHE_KEY = 'meu-treino-exercicios';

async function sbFetch(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  });
  if (!res.ok) throw new Error(`supabase ${res.status}`);
  return res.json();
}

async function loadExercicios() {
  try {
    const [dias, exercicios] = await Promise.all([
      sbFetch('dias_treino?select=*&order=ordem'),
      sbFetch('exercicios?select=*&order=dia,ordem'),
    ]);

    const treinos = {};
    for (const d of dias) {
      treinos[d.dia] = { foco: d.foco, exercicios: [] };
    }
    for (const e of exercicios) {
      if (!treinos[e.dia]) continue;
      treinos[e.dia].exercicios.push({
        nome: e.nome,
        series: e.series,
        reps: e.reps,
        intervalo: e.intervalo || '',
        sugerida: e.sugerida ?? 0,
        lipedema: e.lipedema ?? false,
        obs: e.obs || '',
        video: e.video || '',
        alternativas: e.alternativas || [],
      });
    }

    TREINOS = treinos;
    try { localStorage.setItem(EX_CACHE_KEY, JSON.stringify(treinos)); } catch {}
  } catch {
    try {
      const cached = localStorage.getItem(EX_CACHE_KEY);
      if (cached) TREINOS = JSON.parse(cached);
    } catch {}
    // se tudo falhar, fica no TREINOS_FALLBACK já atribuído
  }
}

async function logToSupabase(entry) {
  try {
    await fetch(`${SB_URL}/rest/v1/historico_treino`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify(entry),
    });
  } catch(e) { /* silencioso — localStorage é o fallback */ }
}

async function marcarConcluidoSupabase(data, dia, exercicio) {
  try {
    await fetch(`${SB_URL}/rest/v1/treino_concluidos`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify({ data, dia, exercicio }),
    });
  } catch(e) { /* silencioso — localStorage é o fallback */ }
}

async function desmarcarConcluidoSupabase(data, dia, exercicio) {
  try {
    await fetch(`${SB_URL}/rest/v1/treino_concluidos?data=eq.${data}&dia=eq.${encodeURIComponent(dia)}&exercicio=eq.${encodeURIComponent(exercicio)}`, {
      method: 'DELETE',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` },
    });
  } catch(e) { /* silencioso */ }
}

async function loadConcluidosHoje() {
  try {
    const k = todayKey();
    const rows = await sbFetch(`treino_concluidos?data=eq.${k}&select=dia,exercicio`);
    if (!state.concluidos[k]) state.concluidos[k] = {};
    rows.forEach(r => { state.concluidos[k][r.dia + '|' + r.exercicio] = true; });
    saveState();
  } catch(e) { /* offline — fica só com o que tem local */ }
}

// ============================================
// STORAGE
// ============================================
const KEY = 'meu-treino-v2';
const initial = { cargas: {}, observacoes: {}, concluidos: {}, historico: [] };

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return { ...initial };
    return { ...initial, ...JSON.parse(raw) };
  } catch { return { ...initial }; }
}
function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();
let diaSelecionado = DIAS[new Date().getDay()];

// ============================================
// HELPERS
// ============================================
function todayKey() { return new Date().toISOString().slice(0,10); }

function isConcluido(nome) {
  const k = todayKey();
  const key = diaSelecionado + '|' + nome;
  return !!(state.concluidos[k] && state.concluidos[k][key]);
}

function ultimaCarga(nome) {
  for (let i = state.historico.length - 1; i >= 0; i--) {
    const h = state.historico[i];
    if (h.exercicio === nome && h.carga != null && h.carga !== '') return h;
  }
  return null;
}

function diasAtras(dataStr) {
  const d = new Date(dataStr + 'T00:00:00');
  const hoje = new Date(todayKey() + 'T00:00:00');
  const diff = Math.round((hoje - d) / 86400000);
  if (diff === 0) return 'hoje';
  if (diff === 1) return 'ontem';
  return `${diff} dias atrás`;
}

function toggleConcluido(nome) {
  const k = todayKey();
  const key = diaSelecionado + '|' + nome;
  if (!state.concluidos[k]) state.concluidos[k] = {};
  if (state.concluidos[k][key]) {
    delete state.concluidos[k][key];
    desmarcarConcluidoSupabase(k, diaSelecionado, nome);
  } else {
    state.concluidos[k][key] = true;
    marcarConcluidoSupabase(k, diaSelecionado, nome);
    const entry = {
      data: k, dia: diaSelecionado, exercicio: nome,
      carga: state.cargas[nome] ?? null,
      observacao: state.observacoes[nome] ?? '',
      timestamp: Date.now(),
    };
    state.historico.push(entry);
    logToSupabase(entry);
  }
  saveState();
  render();
}

// ============================================
// RENDER
// ============================================
function renderDayTabs() {
  const wrap = document.getElementById('day-tabs');
  wrap.innerHTML = '';
  const ordem = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
  ordem.forEach(dia => {
    const treino = TREINOS[dia];
    const isRest = treino.exercicios.length === 0;
    const k = todayKey();
    const feitos = isRest
      ? (state.concluidos[k]?.[dia + '|' + ATIVIDADE_LIVRE] ? 1 : 0)
      : treino.exercicios.filter(e => state.concluidos[k]?.[dia + '|' + e.nome]).length;
    const hasProgress = feitos > 0;

    const btn = document.createElement('button');
    btn.className = 'day-tab' + (dia === diaSelecionado ? ' active' : '') +
                    (isRest ? ' is-rest' : '') +
                    (hasProgress ? ' has-progress' : '');
    btn.innerHTML = `<span class="day-letter">${dia[0]}</span><span class="day-dot"></span>`;
    btn.title = dia;
    btn.onclick = () => { diaSelecionado = dia; render(); };
    wrap.appendChild(btn);
  });
}

const ATIVIDADE_LIVRE = 'Atividade física livre';

function dataDaSemana(diaNome) {
  const idx = DIAS.indexOf(diaNome);
  const hojeIdx = new Date().getDay();
  const d = new Date();
  d.setDate(d.getDate() + (idx - hojeIdx));
  return `${d.getDate()} ${MESES_PT[d.getMonth()].slice(0,3)}`;
}

function renderExercises() {
  const treino = TREINOS[diaSelecionado];
  const exs = treino.exercicios;

  document.getElementById('day-name').textContent = diaSelecionado;
  document.getElementById('day-date').textContent = dataDaSemana(diaSelecionado);
  document.getElementById('day-focus').textContent = treino.foco;
  document.getElementById('today-eyebrow').textContent =
    diaSelecionado === DIAS[new Date().getDay()] ? 'Hoje' : 'Próximo treino';

  const container = document.getElementById('exercises');

  if (exs.length === 0) {
    const done = isConcluido(ATIVIDADE_LIVRE);
    document.getElementById('progress-fill').style.width = done ? '100%' : '0%';
    document.getElementById('progress-text').textContent = done ? '1/1' : '0/1';
    container.innerHTML = `
      <div class="rest-state">
        <h2>descanso</h2>
        <p>Recuperação faz parte. Escolha 1 atividade física livre — caminhada, pilates, alongamento — com no mínimo 30 minutos.</p>
      </div>
      <div class="exercise ${done ? 'done' : ''}">
        <div class="exercise-head">
          <div class="check ${done ? 'done' : ''}" data-action="toggle" data-nome="${ATIVIDADE_LIVRE}">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 6L5 9L10 3"/></svg>
          </div>
          <div class="exercise-body">
            <div class="exercise-name">${ATIVIDADE_LIVRE}</div>
            <div class="exercise-meta">mínimo 30 min</div>
          </div>
        </div>
      </div>`;
    container.querySelector('[data-action="toggle"]').onclick = () => { toggleConcluido(ATIVIDADE_LIVRE); };
    return;
  }

  const k = todayKey();
  const feitos = exs.filter(e => state.concluidos[k]?.[diaSelecionado + '|' + e.nome]).length;
  document.getElementById('progress-fill').style.width = (feitos/exs.length*100) + '%';
  document.getElementById('progress-text').textContent = `${feitos}/${exs.length}`;

  container.innerHTML = '';
  exs.forEach(ex => {
    const done = isConcluido(ex.nome);
    const cargaAtual = state.cargas[ex.nome] ?? '';
    const obs = state.observacoes[ex.nome] ?? '';
    const ultimo = ultimaCarga(ex.nome);
    const meta = `${ex.series}×${ex.reps} · ${ex.intervalo}`;

    const div = document.createElement('div');
    div.className = 'exercise' + (done ? ' done' : '');
    div.innerHTML = `
      <div class="exercise-head">
        <div class="check ${done ? 'done' : ''}" data-action="toggle">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 6L5 9L10 3"/></svg>
        </div>
        <div class="exercise-body" data-action="expand">
          <div class="exercise-name">
            ${ex.nome}
            ${ex.lipedema ? '<span class="lipedema-badge">💜 lipedema</span>' : ''}
          </div>
          <div class="exercise-meta">${meta}</div>
        </div>
        <svg class="chevron" data-action="expand" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 5L7 9L11 5"/>
        </svg>
      </div>
      <div class="exercise-detail">
        ${ex.obs ? `<div class="tip">${ex.obs}</div>` : ''}
        <div class="field">
          <label>Carga (kg)</label>
          <input type="number" inputmode="decimal" step="0.5" data-field="carga"
                 value="${cargaAtual}"
                 placeholder="${ex.sugerida === 0 ? 'sem peso' : ex.sugerida}">
          <div class="hint">
            ${ex.sugerida === 0
              ? '<strong>Sugerido:</strong> só a mini-band'
              : `<strong>Sugerido:</strong> ${ex.sugerida} kg`}
            ${ultimo ? `<br><strong>Último:</strong> ${ultimo.carga}kg (${diasAtras(ultimo.data)})` : ''}
          </div>
        </div>
        <div class="field">
          <label>Observação</label>
          <textarea data-field="obs" placeholder="Como foi? Doeu? Pegou pesado?">${obs}</textarea>
        </div>
        ${(ex.video || (ex.alternativas && ex.alternativas.length)) ? `
        <div class="ex-links">
          ${ex.video ? `<a class="ex-link" href="${ex.video}" target="_blank" rel="noopener">▶ ver execução</a>` : ''}
          ${ex.alternativas && ex.alternativas.length ? `
            <button class="alt-toggle">↔ ver alternativa</button>
            <div class="alt-list">
              ${ex.alternativas.map(a => `<span>${a}</span>`).join('')}
            </div>
          ` : ''}
        </div>` : ''}
      </div>
    `;

    div.querySelector('[data-action="toggle"]').onclick = (e) => {
      e.stopPropagation();
      toggleConcluido(ex.nome);
    };
    const expand = () => div.classList.toggle('open');
    div.querySelector('.exercise-body').onclick = expand;
    div.querySelector('.chevron').onclick = expand;

    const inputCarga = div.querySelector('[data-field="carga"]');
    inputCarga.onclick = (e) => e.stopPropagation();
    inputCarga.oninput = (e) => {
      const v = e.target.value;
      state.cargas[ex.nome] = v === '' ? '' : Number(v);
      saveState();
    };

    const txtObs = div.querySelector('[data-field="obs"]');
    txtObs.onclick = (e) => e.stopPropagation();
    txtObs.oninput = (e) => {
      state.observacoes[ex.nome] = e.target.value;
      saveState();
    };

    const altToggle = div.querySelector('.alt-toggle');
    if (altToggle) {
      altToggle.onclick = (e) => {
        e.stopPropagation();
        const list = div.querySelector('.alt-list');
        list.classList.toggle('open');
        altToggle.textContent = list.classList.contains('open') ? '↑ fechar alternativas' : '↔ ver alternativa';
      };
    }

    const exLink = div.querySelector('.ex-link');
    if (exLink) exLink.onclick = (e) => e.stopPropagation();

    container.appendChild(div);
  });
}

// ============================================
// CALENDÁRIO DE FREQUÊNCIA
// ============================================
const MESES_PT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const hoje = new Date();
let calAno = hoje.getFullYear();
let calMes = hoje.getMonth(); // 0-indexed

async function fetchDiasTreinadosMes(ano, mes) {
  const ini = `${ano}-${String(mes+1).padStart(2,'0')}-01`;
  const ultimoDia = new Date(ano, mes+1, 0).getDate();
  const fim = `${ano}-${String(mes+1).padStart(2,'0')}-${String(ultimoDia).padStart(2,'0')}`;
  try {
    const rows = await sbFetch(`treino_concluidos?data=gte.${ini}&data=lte.${fim}&select=data`);
    return new Set(rows.map(r => r.data));
  } catch(e) {
    return new Set();
  }
}

async function renderCalendario() {
  document.getElementById('cal-label').textContent = `${MESES_PT[calMes]} ${calAno}`;

  const diasTreinados = await fetchDiasTreinadosMes(calAno, calMes);
  const primeiroDia = new Date(calAno, calMes, 1);
  const ultimoDia = new Date(calAno, calMes+1, 0).getDate();
  const offset = primeiroDia.getDay(); // 0 = domingo

  const grid = document.getElementById('cal-grid');
  const dows = ['D','S','T','Q','Q','S','S'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  for (let i = 0; i < offset; i++) html += `<div class="cal-day empty"></div>`;

  const todayStr = todayKey();
  const isMesAtual = calAno === hoje.getFullYear() && calMes === hoje.getMonth();

  for (let d = 1; d <= ultimoDia; d++) {
    const dataStr = `${calAno}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = dataStr > todayStr;
    const isToday = dataStr === todayStr;
    const isDone = diasTreinados.has(dataStr);
    const cls = ['cal-day'];
    if (isFuture) cls.push('future');
    if (isDone) cls.push('done');
    if (isToday) cls.push('today');
    html += `<div class="${cls.join(' ')}">${d}</div>`;
  }
  grid.innerHTML = html;

  const total = diasTreinados.size;
  const diasNoPeriodo = isMesAtual ? hoje.getDate() : ultimoDia;
  const semanas = diasNoPeriodo / 7;
  const media = semanas > 0 ? (total / semanas) : 0;

  document.getElementById('cal-total').textContent = total;
  document.getElementById('cal-media').textContent = media.toFixed(1) + 'x';
}

document.getElementById('cal-prev').onclick = () => {
  calMes--;
  if (calMes < 0) { calMes = 11; calAno--; }
  renderCalendario();
};
document.getElementById('cal-next').onclick = () => {
  calMes++;
  if (calMes > 11) { calMes = 0; calAno++; }
  renderCalendario();
};

function renderHistorico() {
  const container = document.getElementById('history-content');
  if (state.historico.length === 0) {
    container.innerHTML = '<div class="empty-state">Sem registros ainda — marque seu primeiro exercício como concluído.</div>';
    return;
  }
  const sorted = [...state.historico].sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
  container.innerHTML = sorted.map(h => `
    <div class="history-entry">
      <div class="history-entry-head">
        <div class="history-entry-name">${h.exercicio}</div>
        <div class="history-entry-date">${h.data} · ${h.dia}</div>
      </div>
      <div class="history-entry-carga">${h.carga != null && h.carga !== '' ? h.carga + ' kg' : 'sem carga registrada'}</div>
      ${h.observacao ? `<div class="history-entry-obs">"${h.observacao}"</div>` : ''}
    </div>
  `).join('');
}

function render() {
  renderDayTabs();
  renderExercises();
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.onclick = () => {
    const target = btn.dataset.view;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + target).classList.add('active');
    if (target === 'historico') { renderHistorico(); renderCalendario(); }
    window.scrollTo(0,0);
  };
});

Promise.all([loadExercicios(), loadConcluidosHoje()]).then(() => render());
